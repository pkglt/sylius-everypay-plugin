services:
    # Scripted EveryPay API responses - tests fetch this public service from the
    # booted container and queue MockResponse objects onto it.
    Tests\Pkg\SyliusEveryPayPlugin\Functional\Support\EveryPayHttpMock:
        public: true

    # Point the real API client at the mock; everything else in the pipeline
    # (bus, transactions, state machines, providers) stays production wiring.
    Pkg\SyliusEveryPayPlugin\Client\EveryPayApiClient:
        arguments:
            - '@Tests\Pkg\SyliusEveryPayPlugin\Functional\Support\EveryPayHttpMock'

    # Programmatic fixtures shared by the functional suite and Behat contexts.
    Tests\Pkg\SyliusEveryPayPlugin\Support\ShopFixtures:
        public: true
        arguments:
            - '@doctrine.orm.default_entity_manager'
            - '@sylius.factory.currency'
            - '@sylius.factory.locale'
            - '@sylius.factory.channel'
            - '@sylius.factory.payment_method'
            - '@sylius.factory.customer'
            - '@sylius.factory.order'
            - '@sylius.factory.payment'
            - '@sylius.factory.adjustment'
            - '@sylius.factory.admin_user'
            - '@sylius.factory.address'

    # Behat context (instantiated by friends-of-behat/symfony-extension).
    Tests\Pkg\SyliusEveryPayPlugin\Behat\Context\EveryPayShopContext:
        public: true
        arguments:
            - '@test.client'
            - '@Tests\Pkg\SyliusEveryPayPlugin\Functional\Support\EveryPayHttpMock'
            - '@Tests\Pkg\SyliusEveryPayPlugin\Support\ShopFixtures'
            - '@doctrine.orm.default_entity_manager'
            - '@router'
            - '@Tests\Pkg\SyliusEveryPayPlugin\Behat\SharedStorage'

    Tests\Pkg\SyliusEveryPayPlugin\Behat\SharedStorage:
        public: true

    Tests\Pkg\SyliusEveryPayPlugin\Behat\Context\EveryPayRefundContext:
        public: true
        arguments:
            - '@Tests\Pkg\SyliusEveryPayPlugin\Functional\Support\EveryPayHttpMock'
            - '@Tests\Pkg\SyliusEveryPayPlugin\Support\ShopFixtures'
            - '@Tests\Pkg\SyliusEveryPayPlugin\Behat\SharedStorage'
            - '@doctrine.orm.default_entity_manager'
            - '@Sylius\Abstraction\StateMachine\StateMachineInterface'

    Tests\Pkg\SyliusEveryPayPlugin\Behat\Context\EveryPayAdminContext:
        public: true
        arguments:
            - '@Tests\Pkg\SyliusEveryPayPlugin\Functional\Support\EveryPayHttpMock'
            - '@Tests\Pkg\SyliusEveryPayPlugin\Support\ShopFixtures'
            - '@Tests\Pkg\SyliusEveryPayPlugin\Behat\SharedStorage'
            - '@doctrine.orm.default_entity_manager'
            - '@router'
