name: Build

on:
    push:
        branches: [main]
    pull_request: ~

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    tests:
        runs-on: ubuntu-latest
        name: "PHP ${{ matrix.php }}, ${{ matrix.dependencies }} deps"

        strategy:
            fail-fast: false
            matrix:
                php: ["8.2", "8.3", "8.4", "8.5"]
                # lowest resolves the Symfony 6.4 line, highest the current
                # Symfony/Sylius releases - both lines stay covered.
                dependencies: [highest, lowest]

        steps:
            - uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "${{ matrix.php }}"
                  coverage: none

            - name: Validate composer.json
              run: composer validate --ansi --strict

            - name: Install dependencies
              uses: ramsey/composer-install@v4
              with:
                  dependency-versions: "${{ matrix.dependencies }}"

            - name: Assert lowest deps resolve the Symfony 6.4 line
              if: matrix.dependencies == 'lowest'
              run: composer show symfony/framework-bundle | grep -E 'versions.*6\.4\.'

            - name: Coding standard
              if: matrix.dependencies == 'highest'
              run: vendor/bin/ecs check

            - name: Static analysis
              if: matrix.dependencies == 'highest'
              run: vendor/bin/phpstan analyse

            - name: Tests (unit + functional)
              run: vendor/bin/phpunit

            - name: Behat scenarios
              run: vendor/bin/behat --no-interaction --strict -f progress
